<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Tab Redirector Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 5px;
    }

    button {
      margin-top: 15px;
      padding: 5px 10px;
    }
  </style>
</head>

<body>
  <h1>Tab Redirector Settings</h1>
  <label>
    Source URL (to be redirected):
    <input type="text" id="source" placeholder="https://example.com" />
  </label>
  <label>
    Target URL (redirect destination):
    <input type="text" id="target" placeholder="https://other.com" />
  </label>
  <button id="save">Save</button>
  <script src="options.js"></script>
</body>

</html>
