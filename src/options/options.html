<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Replace New Window Startup Page - Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>

<body>
  <div class="container">
    <h1>Settings</h1>

    <div class="input-group">
      <label for="source">Source URL (to be replaced):</label>
      <input type="text" id="source" placeholder="https://example.com" />
      <small>The URL that should trigger the redirect.</small>
    </div>

    <div class="input-group">
      <label for="target">Target URL (redirect destination):</label>
      <input type="text" id="target" placeholder="https://other.com" />
      <small>Leave empty to redirect to <code>about:blank</code>.</small>
    </div>

    <div class="actions">
      <button id="save" class="primary">Save Settings</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>

</html>
